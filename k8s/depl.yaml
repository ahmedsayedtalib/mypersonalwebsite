apiVersion: apps/v1
kind: Deployment
metadata:
  name: personalwebsite
  labels:
    app: mypersonalwebsite
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mypersonalwebsite
  template:
    metadata:
      labels:
        app: mypersonalwebsite
    spec:
      containers:
      - name: personalwebsite
        image: ahmedsayedtalib/nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: personalwebsite-service
  labels:
    app: mypersonalwebsite
spec:
  selector:
    app: mypersonalwebsite
  type: NodePort
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 31000
